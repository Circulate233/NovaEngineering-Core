name: Release

on:
  push:
    tags: [ 'v*' ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build
        run: chmod +x gradlew && ./gradlew build

      - name: Collect release assets
        id: assets
        shell: bash
        run: |
          mapfile -t files < <(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-dev.jar' ! -name '*-shadow.jar' | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release-ready jar found in build/libs" >&2
            exit 1
          fi
          {
            echo 'files<<EOF'
            printf '%s\n' "${files[@]}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.assets.outputs.files }}
